<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History with localStorage</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        ul { list-style-type: none; padding: 0; }
        li { padding: 10px; border: 1px solid #ccc; margin-bottom: 10px; }
    </style>
</head>
<body>
    <h1>History from localStorage</h1>
    <ul id="history"></ul>
    <script>
        function populateHistory() {
            const historyList = document.getElementById('history');
            const now = new Date();
            const thirtyDaysAgo = new Date(now);
            thirtyDaysAgo.setDate(now.getDate() - 30);
            const historyItems = JSON.parse(localStorage.getItem('history')) || [];

            historyItems.forEach(item => {
                const itemDate = new Date(item.date);
                if (itemDate >= thirtyDaysAgo) {
                    const li = document.createElement('li');
                    li.textContent = `Visited: ${item.url} on ${itemDate.toUTCString()}`;
                    historyList.appendChild(li);
                }
            });
        }

        // Example of adding a history item - replace this with real usage
        function addHistoryItem(url) {
            const historyItems = JSON.parse(localStorage.getItem('history')) || [];
            historyItems.push({ url, date: new Date().toISOString() });
            localStorage.setItem('history', JSON.stringify(historyItems));
        }

        populateHistory();
    </script>
</body>
</html>
